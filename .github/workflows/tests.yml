name: tests

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.0"
          # TODO: cache uv?
          # cache: "pip"
          # cache-dependency-path: "requirements/requirements*.txt"
      - name: Install dependencies
        run: |
          uv sync --group dev
          python download_binaries.py
      - name: Run tests
        env:
          JIMMY_TEST_PASSWORD: ${{ secrets.JIMMY_TEST_PASSWORD }}
          PYTHONPATH: jimmy
        run: pytest --capture=no --numprocesses=auto
