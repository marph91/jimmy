name: lint

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.0"
          # TODO cache uv?
          # cache: "pip"
          # cache-dependency-path: "requirements/requirements*.txt"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run linting
        run: ./lint.sh
